apiVersion: v1
kind: Namespace
metadata:
  name: project-lantern
---
# --- SECRETS (Passwords) ---
apiVersion: v1
kind: Secret
metadata:
  name: lantern-secrets
  namespace: project-lantern
type: Opaque
stringData:
  # Change these to your actual system user/pass created in PocketBase UI
  pb-system-user: "hub_server"
  pb-system-pass: "changeme123"
---
# --- TLS CERTIFICATE (Cert-Manager) ---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: project-lantern-tls
  namespace: project-lantern
spec:
  secretName: project-lantern-tls-secret
  commonName: game.dungeonmomo.cc
  dnsNames:
    - game.dungeonmomo.cc
  issuerRef:
    name: letsencrypt-prod # Ensure this matches your ClusterIssuer name
    kind: ClusterIssuer
---
# --- POCKETBASE (Internal Database) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pb-data-pvc
  namespace: project-lantern
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocketbase
  namespace: project-lantern
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pocketbase
  template:
    metadata:
      labels:
        app: pocketbase
    spec:
      containers:
        - name: pocketbase
          image: adrianmusante/pocketbase:latest
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: pb-data
              mountPath: /pb/pb_data
      volumes:
        - name: pb-data
          persistentVolumeClaim:
            claimName: pb-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pocketbase
  namespace: project-lantern
spec:
  selector:
    app: pocketbase
  ports:
    - protocol: TCP
      port: 8090
      targetPort: 8090
---
# --- HUB SERVER ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-server
  namespace: project-lantern
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-server
  template:
    metadata:
      labels:
        app: hub-server
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: game
          image: harbor.kube.dungeonmomo.cc/project-lantern/project-lantern:latest
          args: [
            "--headless", "--", 
            "--hub", 
            "--cert=/mnt/certs/tls.crt", 
            "--key=/mnt/certs/tls.key"
          ]
          ports:
            - containerPort: 9797
              protocol: UDP
          env:
            - name: PB_URL
              value: "http://pocketbase:8090"
            - name: PB_SYSTEM_USER
              valueFrom:
                secretKeyRef:
                  name: lantern-secrets
                  key: pb-system-user
            - name: PB_SYSTEM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lantern-secrets
                  key: pb-system-pass
          volumeMounts:
            - name: certs
              mountPath: "/mnt/certs"
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: project-lantern-tls-secret
---
apiVersion: v1
kind: Service
metadata:
  name: hub-service
  namespace: project-lantern
spec:
  type: NodePort
  selector:
    app: hub-server
  ports:
    - protocol: UDP
      port: 9797
      targetPort: 9797
      nodePort: 31077
---
# --- DUNGEON SERVER ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dungeon-server
  namespace: project-lantern
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dungeon-server
  template:
    metadata:
      labels:
        app: dungeon-server
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: game
          image: harbor.kube.dungeonmomo.cc/project-lantern/project-lantern:latest
          args: [
            "--headless", "--", 
            "--dungeon", 
            "--cert=/mnt/certs/tls.crt", 
            "--key=/mnt/certs/tls.key"
          ]
          ports:
            - containerPort: 9798
              protocol: UDP
          env:
            - name: PB_URL
              value: "http://pocketbase:8090"
            - name: PB_SYSTEM_USER
              valueFrom:
                secretKeyRef:
                  name: lantern-secrets
                  key: pb-system-user
            - name: PB_SYSTEM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lantern-secrets
                  key: pb-system-pass
          volumeMounts:
            - name: certs
              mountPath: "/mnt/certs"
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: project-lantern-tls-secret
---
apiVersion: v1
kind: Service
metadata:
  name: dungeon-service
  namespace: project-lantern
spec:
  type: NodePort
  selector:
    app: dungeon-server
  ports:
    - protocol: UDP
      port: 9798
      targetPort: 9798
      nodePort: 32145
